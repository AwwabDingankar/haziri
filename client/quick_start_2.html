<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Haziri Quick Start Guide</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#3525cd",
              "secondary": "#58579b",
              "surface-container": "#edeeef",
              "primary-container": "#4f46e5",
              "tertiary-container": "#a44100",
              "on-secondary-container": "#454386",
              "on-tertiary": "#ffffff",
              "background": "#f8f9fa",
              "on-tertiary-container": "#ffd2be",
              "tertiary-fixed": "#ffdbcc",
              "primary-fixed": "#e2dfff",
              "surface-variant": "#e1e3e4",
              "surface-container-high": "#e7e8e9",
              "secondary-fixed": "#e2dfff",
              "inverse-on-surface": "#f0f1f2",
              "surface-container-lowest": "#ffffff",
              "surface-dim": "#d9dadb",
              "surface-bright": "#f8f9fa",
              "surface-container-low": "#f3f4f5",
              "on-tertiary-fixed": "#351000",
              "tertiary-fixed-dim": "#ffb695",
              "on-secondary-fixed-variant": "#413f82",
              "surface": "#f8f9fa",
              "on-background": "#191c1d",
              "primary-fixed-dim": "#c3c0ff",
              "error-container": "#ffdad6",
              "on-surface-variant": "#464555",
              "on-error": "#ffffff",
              "on-secondary-fixed": "#140f54",
              "on-primary-container": "#dad7ff",
              "on-primary-fixed": "#0f0069",
              "tertiary": "#7e3000",
              "on-primary-fixed-variant": "#3323cc",
              "on-tertiary-fixed-variant": "#7b2f00",
              "on-error-container": "#93000a",
              "inverse-primary": "#c3c0ff",
              "outline-variant": "#c7c4d8",
              "surface-tint": "#4d44e3",
              "on-secondary": "#ffffff",
              "inverse-surface": "#2e3132",
              "error": "#ba1a1a",
              "surface-container-highest": "#e1e3e4",
              "secondary-fixed-dim": "#c3c0ff",
              "secondary-container": "#b6b4ff",
              "on-primary": "#ffffff",
              "outline": "#777587",
              "on-surface": "#191c1d"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="docked full-width top-0 z-50 bg-[#F8F9FA] dark:bg-slate-950 flex justify-between items-center w-full px-6 h-16">
<button class="hover:opacity-80 transition-opacity Active: scale-95 duration-200">
<span class="material-symbols-outlined text-[#3525CD] dark:text-[#4F46E5]" data-icon="close">close</span>
</button>
<span class="font-['Manrope'] font-bold text-lg tracking-tight text-[#3525CD] dark:text-[#4F46E5]">Haziri</span>
<button class="hover:opacity-80 transition-opacity Active: scale-95 duration-200 font-['Manrope'] font-bold text-lg tracking-tight text-[#3525CD] dark:text-[#4F46E5]">
            Skip
        </button>
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-8 pb-32">
<div class="max-w-md w-full space-y-10">
<!-- Step Indicator -->
<div class="flex items-center justify-center gap-2">
<div class="h-1.5 w-12 rounded-full bg-gradient-to-r from-primary to-primary-container"></div>
<div class="h-1.5 w-1.5 rounded-full bg-surface-dim"></div>
<div class="h-1.5 w-1.5 rounded-full bg-surface-dim"></div>
</div>
<!-- Main Content Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0px_12px_32px_rgba(25,28,29,0.04)] relative overflow-hidden">
<!-- Decorative Accent -->
<div class="absolute -top-6 -left-6 w-24 h-24 bg-tertiary-fixed rounded-full opacity-30 blur-2xl"></div>
<div class="relative z-10 space-y-8">
<!-- Icon Presentation -->
<div class="flex justify-center">
<div class="relative">
<div class="absolute inset-0 bg-primary/10 rounded-full scale-125 blur-xl"></div>
<div class="w-20 h-20 rounded-full bg-surface-container-low flex items-center justify-center text-primary border border-outline-variant/20">
<span class="material-symbols-outlined text-4xl" data-icon="library_add" style="font-variation-settings: 'FILL' 0;">library_add</span>
</div>
<div class="absolute -bottom-2 -right-2 w-10 h-10 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center text-white shadow-lg">
<span class="material-symbols-outlined text-xl" data-icon="add">add</span>
</div>
</div>
</div>
<!-- Editorial Content -->
<div class="text-center space-y-4">
<p class="font-label text-[0.75rem] font-medium tracking-[0.05em] uppercase text-on-surface-variant">
                            Step 1 of 3
                        </p>
<h1 class="font-headline text-[1.5rem] font-bold leading-tight text-on-surface">
                            Step 1: Create Your Course
                        </h1>
<p class="font-body text-[1rem] leading-relaxed text-on-surface-variant/80">
                            Tap the "+" button to name your course and set a cover. This will be the home for your learners.
                        </p>
</div>
<!-- Visual Context / Preview -->
<div class="rounded-xl overflow-hidden border border-outline-variant/20">
<img alt="App Interface" class="w-full h-48 object-cover grayscale-[20%] opacity-90" data-alt="Modern app interface showing a minimalist workspace with a clean plus button and soft blurred studio background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAzu29nsHdbhmieQAsyveDnNQ1ag17iOIzPhnBMKy4qGr0fobB3j56NeDpMon7WKTKKp_WGVhFtpQVGipaJqtGiYw-ylB5XP36OibbaurpSC-dUKJfgky96QzuBRDFRZfYVpAKCOtrhezL5fqXeDHZNifDTwuS8B14qow899APyrNNGnUey06HfyC85CgezSb0-UHtdJjyNTPv8cYJ0NWCzUlOJSAi6TRREyTNeh791V_nGjt8RKq7uuoOkXFVEhKL4z94xTvCOa5s"/>
</div>
</div>
</div>
<!-- Contextual Tip -->
<div class="flex items-center gap-4 px-4 py-3 bg-tertiary-fixed/40 rounded-xl">
<span class="material-symbols-outlined text-tertiary" data-icon="lightbulb">lightbulb</span>
<p class="text-[0.875rem] font-medium text-on-tertiary-fixed-variant">
                    Quick Tip: You can import your course syllabus directly.
                </p>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-8 pb-8 pt-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md rounded-t-[24px] shadow-[0px_-12px_32px_rgba(25,28,29,0.04)]">
<!-- Previous (Inactive) -->
<button class="flex flex-row items-center justify-center text-[#3525CD] dark:text-[#4F46E5] border border-[#C7C4D8]/20 rounded-full px-8 py-3 gap-2 hover:brightness-110 transition-all Active: scale-[0.98] duration-150">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
<span class="font-['Inter'] font-medium text-xs tracking-[0.02em] uppercase">Previous</span>
</button>
<!-- Next (Active State Determined by context) -->
<button class="flex flex-row items-center justify-center bg-gradient-to-br from-[#3525CD] to-[#4F46E5] text-white rounded-full px-8 py-3 gap-2 hover:brightness-110 transition-all Active: scale-[0.98] duration-150">
<span class="font-['Inter'] font-medium text-xs tracking-[0.02em] uppercase">Next</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</nav>
</body></html>
