<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#3525cd",
              "secondary": "#58579b",
              "surface-container": "#edeeef",
              "primary-container": "#4f46e5",
              "tertiary-container": "#a44100",
              "on-secondary-container": "#454386",
              "on-tertiary": "#ffffff",
              "background": "#f8f9fa",
              "on-tertiary-container": "#ffd2be",
              "tertiary-fixed": "#ffdbcc",
              "primary-fixed": "#e2dfff",
              "surface-variant": "#e1e3e4",
              "surface-container-high": "#e7e8e9",
              "secondary-fixed": "#e2dfff",
              "inverse-on-surface": "#f0f1f2",
              "surface-container-lowest": "#ffffff",
              "surface-dim": "#d9dadb",
              "surface-bright": "#f8f9fa",
              "surface-container-low": "#f3f4f5",
              "on-tertiary-fixed": "#351000",
              "tertiary-fixed-dim": "#ffb695",
              "on-secondary-fixed-variant": "#413f82",
              "surface": "#f8f9fa",
              "on-background": "#191c1d",
              "primary-fixed-dim": "#c3c0ff",
              "error-container": "#ffdad6",
              "on-surface-variant": "#464555",
              "on-error": "#ffffff",
              "on-secondary-fixed": "#140f54",
              "on-primary-container": "#dad7ff",
              "on-primary-fixed": "#0f0069",
              "tertiary": "#7e3000",
              "on-primary-fixed-variant": "#3323cc",
              "on-tertiary-fixed-variant": "#7b2f00",
              "on-error-container": "#93000a",
              "inverse-primary": "#c3c0ff",
              "outline-variant": "#c7c4d8",
              "surface-tint": "#4d44e3",
              "on-secondary": "#ffffff",
              "inverse-surface": "#2e3132",
              "error": "#ba1a1a",
              "surface-container-highest": "#e1e3e4",
              "secondary-fixed-dim": "#c3c0ff",
              "secondary-container": "#b6b4ff",
              "on-primary": "#ffffff",
              "outline": "#777587",
              "on-surface": "#191c1d"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .step-indicator-active {
            width: 2rem;
            height: 0.5rem;
            border-radius: 9999px;
            background: linear-gradient(135deg, #3525cd, #4f46e5);
        }
        .step-indicator-inactive {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 9999px;
            background-color: #d9dadb;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 z-50 w-full px-6 h-16 flex justify-between items-center bg-[#F8F9FA] dark:bg-slate-950 no-border">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#3525CD] dark:text-[#4F46E5]" data-icon="close">close</span>
</div>
<h1 class="font-['Manrope'] font-bold text-lg tracking-tight text-[#3525CD] dark:text-[#4F46E5]">Haziri</h1>
<button class="text-[#3525CD] dark:text-[#4F46E5] font-semibold hover:opacity-80 transition-opacity active:scale-95 duration-200">
            Skip
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-20 pb-32">
<!-- Quick Start Guide: Screen 1 (Welcome & Overview) -->
<section class="w-full max-w-md mx-auto text-center">
<!-- Signature Hero Illustration Container -->
<div class="relative mb-10 inline-block">
<div class="absolute -inset-4 bg-tertiary-fixed opacity-30 rounded-full blur-3xl"></div>
<div class="relative w-48 h-48 mx-auto flex items-center justify-center bg-surface-container-lowest rounded-xl shadow-[0px_12px_32px_rgba(25,28,29,0.04)] overflow-hidden">
<img alt="Teacher starting a journey" class="w-full h-full object-cover grayscale-0" data-alt="Minimalist high-fidelity indigo 3D character of a teacher standing next to a large digital screen with a checkmark, clean studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA6JUH0HiFREY07DvQssa_pKcUI9MeQdiRH9QOfzIxQpOk0KCucgBWrtRoUbEWkM6o5bWnufH5ArCpyWVu7FaQTg5K4ZS4i0mg2jHyrvM0ym-CdtoCrW2yEm0Aqu-mMnCkhJWc0_J4ROV-sSq84xEWyE3MxqO6PifLasGxnRKAht25NQ3rxjOdr0mcAOoroC0Ht6vebsuK9w7kQ_AdBD5zrNZM-3vDErhGV679iz6tFHrCwluUWrTkXe4WCFemJOddrVNcMT7OiqFI"/>
</div>
<!-- Editorial Accent -->
<div class="absolute -top-4 -right-4 bg-primary text-white p-3 rounded-full shadow-lg">
<span class="material-symbols-outlined text-2xl" data-icon="rocket_launch">rocket_launch</span>
</div>
</div>
<div class="space-y-4">
<span class="font-label text-xs font-semibold tracking-[0.05em] uppercase text-primary">Overview</span>
<h2 class="font-headline text-[2.75rem] font-bold text-on-surface leading-tight tracking-tight">
                    Welcome to Haziri
                </h2>
<p class="font-body text-lg text-on-surface-variant max-w-[280px] mx-auto leading-relaxed">
                    Let's get you started with your teacher dashboard in 3 simple steps.
                </p>
</div>
<!-- Bento-style Step Preview (Minimalist) -->
<div class="mt-12 grid grid-cols-1 gap-4 text-left">
<div class="flex items-center gap-4 p-4 rounded-xl bg-surface-container-low border border-outline-variant/20">
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center text-primary">
<span class="font-headline font-bold">1</span>
</div>
<div>
<p class="font-headline font-semibold text-sm">Create Course</p>
<p class="text-xs text-on-surface-variant">Set your curriculum foundation</p>
</div>
</div>
</div>
<!-- Asymmetric Step Indicators -->
<div class="mt-12 flex justify-center items-center gap-2">
<div class="step-indicator-active"></div>
<div class="step-indicator-inactive"></div>
<div class="step-indicator-inactive"></div>
<div class="step-indicator-inactive"></div>
</div>
</section>
</main>
<!-- BottomNavBar (Task-Specific Navigation) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-8 pb-8 pt-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md">
<!-- Inactive Previous Button -->
<button class="flex flex-row items-center justify-center text-[#3525CD] dark:text-[#4F46E5] border border-[#C7C4D8]/20 rounded-full px-8 py-3 gap-2 opacity-50 cursor-not-allowed font-['Inter'] font-medium text-xs tracking-[0.02em] uppercase">
<span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span>
            Previous
        </button>
<!-- Active Next Button -->
<button class="flex flex-row items-center justify-center bg-gradient-to-br from-[#3525CD] to-[#4F46E5] text-white rounded-full px-8 py-3 gap-2 font-['Inter'] font-medium text-xs tracking-[0.02em] uppercase hover:brightness-110 transition-all active:scale-[0.98] duration-150 shadow-lg">
            Next
            <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</nav>
<!-- Hidden Layout Overlays for Contextual Awareness (Non-functional placeholders for visual structure) -->
<div class="fixed inset-0 pointer-events-none border-[12px] border-surface z-[60] opacity-50"></div>
</body></html>
