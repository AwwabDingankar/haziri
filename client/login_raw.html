<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Haziri Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#5048e5",
              "background-light": "#f6f6f8",
              "background-dark": "#121121",
            },
            fontFamily: {
              "display": ["Lexend", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px"},
          },
        },
      }
    </script>
<style type="text/tailwindcss">
        body { font-family: 'Lexend', sans-serif; }
        .logo-h-path {
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-0 md:p-6 lg:p-10">
<div class="flex w-full max-w-[1200px] min-h-[700px] bg-white dark:bg-slate-900 overflow-hidden rounded-2xl shadow-2xl shadow-primary/10">
<div class="hidden lg:flex flex-col justify-between w-1/2 bg-primary/10 p-16 relative overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-primary/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-64 h-64 bg-primary/15 rounded-full blur-2xl"></div>
<div class="relative z-10 flex items-center gap-3 text-primary">
<div class="size-10 flex items-center justify-center bg-primary text-white rounded-xl">
<svg class="size-6" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M7 4V20M17 4V20M7 12H17" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"></path>
</svg>
</div>
<h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Haziri</h2>
</div>
<div class="relative z-10">
<div class="w-full aspect-square max-w-sm mx-auto mb-12 flex items-center justify-center relative">
<div class="absolute inset-0 bg-primary/5 rounded-full animate-pulse"></div>
<div class="relative w-4/5 h-4/5 grid grid-cols-3 gap-6 opacity-80">
<div class="bg-primary/30 rounded-2xl aspect-square flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary text-3xl">hub</span>
</div>
<div class="bg-white/50 dark:bg-slate-800/50 rounded-2xl aspect-square"></div>
<div class="bg-primary/10 rounded-2xl aspect-square"></div>
<div class="bg-white/50 dark:bg-slate-800/50 rounded-2xl aspect-square"></div>
<div class="bg-primary rounded-2xl aspect-square flex items-center justify-center shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-white text-3xl">login</span>
</div>
<div class="bg-white/50 dark:bg-slate-800/50 rounded-2xl aspect-square"></div>
<div class="bg-primary/10 rounded-2xl aspect-square"></div>
<div class="bg-white/50 dark:bg-slate-800/50 rounded-2xl aspect-square"></div>
<div class="bg-primary/20 rounded-2xl aspect-square flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl">sync_alt</span>
</div>
</div>
</div>
<h1 class="text-4xl font-black text-slate-900 dark:text-white leading-tight mb-4">
                    Welcome <span class="text-primary text-opacity-80">back.</span>
</h1>
<p class="text-slate-600 dark:text-slate-400 text-lg max-w-sm">
                    Access your personalized workspace and stay connected with your community.
                </p>
</div>
<div class="relative z-10 flex gap-4">
<div class="flex -space-x-3">
<div class="w-10 h-10 rounded-full border-2 border-white bg-slate-200"></div>
<div class="w-10 h-10 rounded-full border-2 border-white bg-slate-300"></div>
<div class="w-10 h-10 rounded-full border-2 border-white bg-slate-400"></div>
</div>
<p class="text-sm text-slate-500 font-medium self-center">Trusted by 2,000+ educators</p>
</div>
</div>
<div class="w-full lg:w-1/2 flex flex-col justify-center px-8 md:px-20 py-12">
<div class="max-w-md w-full mx-auto">
<div class="mb-10 text-center lg:text-left">
<h2 class="text-3xl font-black text-slate-900 dark:text-white mb-2">Welcome Back</h2>
<p class="text-slate-500 dark:text-slate-400">Please enter your details to sign in.</p>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">smartphone</span>
<input class="w-full pl-12 pr-4 h-14 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
<a class="text-xs font-medium text-slate-500 hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full pl-12 pr-4 h-14 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-2">
<button class="w-full h-14 bg-gradient-to-r from-primary to-[#6366f1] text-white font-bold rounded-xl shadow-lg shadow-primary/30 hover:shadow-xl hover:shadow-primary/40 active:scale-[0.98] transition-all" type="submit">
                            Log In
                        </button>
</div>
<div class="flex items-center justify-center gap-2 pt-4">
<p class="text-slate-500 dark:text-slate-400 text-sm">Don't have an account?</p>
<a class="text-primary font-bold text-sm hover:underline" href="#">Sign up</a>
</div>
</form>
<div class="mt-20 pt-8 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between text-[10px] text-slate-400 uppercase tracking-widest font-semibold">
<span>© 2024 Haziri Inc.</span>
<div class="flex gap-4">
<a class="hover:text-primary transition-colors" href="#">Security</a>
<a class="hover:text-primary transition-colors" href="#">Help</a>
</div>
</div>
</div>
</div>
</div>

</body></html>
