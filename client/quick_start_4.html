<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Haziri Quick Start - Step 3</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface antialiased selection:bg-primary/10">
<!-- Top Navigation Shell -->
<header class="bg-[#F8F9FA] dark:bg-slate-950 fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#3525CD] dark:text-[#4F46E5]">close</span>
</div>
<h1 class="font-['Manrope'] font-bold text-lg tracking-tight text-[#3525CD] dark:text-[#4F46E5]">Haziri</h1>
<button class="font-['Inter'] font-medium text-slate-500 hover:opacity-80 transition-opacity">Skip</button>
</header>
<main class="min-h-screen pt-24 pb-32 px-6 flex flex-col items-center">
<!-- Editorial Hero Section -->
<div class="w-full max-w-md mx-auto mb-10">
<div class="inline-block mb-4">
<span class="font-label text-[0.75rem] font-medium tracking-[0.15em] uppercase text-primary bg-primary/10 px-3 py-1 rounded-full">Final Step</span>
</div>
<h2 class="font-headline text-[2.75rem] font-bold leading-[1.1] text-on-surface tracking-tight mb-4">Step 3: Start a Session</h2>
<p class="font-body text-lg text-on-surface-variant leading-relaxed">Go live to allow students to mark their attendance in real-time.</p>
</div>
<!-- Visual Bento Card -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0px_12px_32px_rgba(25,28,29,0.04)] overflow-hidden mb-12 relative group">
<div class="aspect-[4/5] w-full bg-surface-container-low flex items-center justify-center p-8 overflow-hidden">
<!-- Abstract "Live Session" UI Illustration -->
<div class="relative w-full h-full flex items-center justify-center">
<div class="absolute inset-0 opacity-20 bg-gradient-to-tr from-primary to-primary-container blur-3xl rounded-full"></div>
<div class="relative z-10 w-full max-w-[280px] bg-surface-container-lowest/80 glass-effect rounded-xl p-6 border border-outline-variant/20 shadow-xl">
<div class="flex items-center gap-3 mb-6">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">sensors</span>
</div>
<div>
<div class="h-2 w-24 bg-surface-dim rounded-full mb-2"></div>
<div class="h-1.5 w-16 bg-surface-dim/50 rounded-full"></div>
</div>
</div>
<div class="space-y-4 mb-8">
<div class="flex items-center justify-between p-3 rounded-lg bg-surface-container">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
<div class="h-2 w-20 bg-on-surface-variant/20 rounded-full"></div>
</div>
<div class="h-2 w-8 bg-on-surface-variant/20 rounded-full"></div>
</div>
<div class="flex items-center justify-between p-3 rounded-lg border border-outline-variant/20">
<div class="h-2 w-24 bg-surface-dim rounded-full"></div>
<div class="h-2 w-10 bg-surface-dim rounded-full"></div>
</div>
</div>
<div class="w-full h-12 bg-gradient-to-br from-primary to-primary-container rounded-full flex items-center justify-center">
<div class="h-2 w-24 bg-white/30 rounded-full"></div>
</div>
</div>
<!-- Floating Secondary Element -->
<div class="absolute -bottom-4 -right-2 w-32 h-32 bg-tertiary-fixed/30 rounded-full blur-2xl"></div>
<div class="absolute top-12 -left-4 p-4 bg-surface-container-lowest glass-effect rounded-xl shadow-lg border border-outline-variant/10 flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary text-sm">group</span>
<span class="text-[10px] font-bold text-on-surface uppercase tracking-wider">42 Live</span>
</div>
</div>
</div>
<!-- Floating Label Over Image -->
<div class="absolute bottom-6 left-6 right-6">
<div class="bg-surface-container-lowest/90 backdrop-blur-md p-4 rounded-xl border border-outline-variant/10 shadow-sm flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-white">bolt</span>
</div>
<div>
<p class="font-headline text-sm font-semibold text-on-surface">Real-time Sync</p>
<p class="font-body text-xs text-on-surface-variant">Instant attendance verification</p>
</div>
</div>
</div>
</div>
<!-- Asymmetric Dash Indicators -->
<div class="flex items-center gap-2 mb-12">
<div class="w-2 h-2 rounded-full bg-surface-dim"></div>
<div class="w-2 h-2 rounded-full bg-surface-dim"></div>
<div class="w-12 h-2 rounded-full bg-gradient-to-r from-primary to-primary-container"></div>
</div>
</main>
<!-- Bottom Navigation Shell (Fixed Bottom) -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-8 pb-8 pt-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md rounded-t-[24px] shadow-[0px_-12px_32px_rgba(25,28,29,0.04)]">
<!-- Previous Button (Inactive Style) -->
<button class="flex flex-row items-center justify-center text-[#3525CD] dark:text-[#4F46E5] border border-[#C7C4D8]/20 rounded-full px-8 py-3 gap-2 hover:brightness-110 transition-all active:scale-[0.98] duration-150">
<span class="material-symbols-outlined text-base">arrow_back</span>
<span class="font-['Inter'] font-medium text-xs tracking-[0.02em] uppercase">Previous</span>
</button>
<!-- Final "Get Started" Primary Action -->
<button class="flex flex-row items-center justify-center bg-gradient-to-br from-[#3525CD] to-[#4F46E5] text-white rounded-full px-8 py-3 gap-2 hover:brightness-110 transition-all active:scale-[0.98] duration-150">
<span class="font-['Inter'] font-medium text-xs tracking-[0.02em] uppercase">Get Started</span>
<span class="material-symbols-outlined text-base">arrow_forward</span>
</button>
</footer>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 -z-10 w-[500px] h-[500px] bg-primary/5 blur-[120px] rounded-full translate-x-1/2 -translate-y-1/2"></div>
<div class="fixed bottom-0 left-0 -z-10 w-[400px] h-[400px] bg-tertiary-fixed/10 blur-[100px] rounded-full -translate-x-1/2 translate-y-1/2"></div>
